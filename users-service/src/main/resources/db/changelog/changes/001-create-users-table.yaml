databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: nicolas
      changes:
        - createTable:
            tableName: users
            columns:

              - column:
                  name: id_usuario
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nombre
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: correo
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: rol
                  type: VARCHAR(50)